<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>対戦成績</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  @font-face {
    font-family: 'ScoreDigits';
    src: local('Arial Narrow Bold');
  }

  :root {
    --bg: #0A0A09;
    --bg-elevated: #18160F;
    --surface: #201D16;
    --surface-hover: #2B2619;
    --line: #37311F;
    --orange: #E4793C;
    --orange-dim: #7A3D1F;
    --text: #F6F3EA;
    --green: #6FA96F;
    --green-dim: #2E4A30;
    --text-dim: #A79E8C;
    --text-faint: #6B6252;
    --loss: #574F3C;
    --danger: #C24A2E;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  body {
    display: flex;
    justify-content: center;
  }

  .app {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    background: var(--bg);
    position: relative;
    display: flex;
    flex-direction: column;
    background-image:
      radial-gradient(circle at 15% 0%, rgba(228,121,60,0.08), transparent 45%),
      radial-gradient(circle at 100% 15%, rgba(111,169,111,0.08), transparent 40%);
  }

  /* ---------- Header ---------- */
  header {
    padding: 22px 20px 16px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  .brand {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .brand .eyebrow {
    font-size: 11px;
    letter-spacing: 0.16em;
    color: var(--text-faint);
    text-transform: uppercase;
    font-weight: 600;
  }

  .brand h1 {
    font-size: 21px;
    font-weight: 800;
    letter-spacing: -0.01em;
  }

  .brand h1 span { color: var(--orange); }

  /* ---------- Tabs content ---------- */
  main {
    flex: 1;
    padding: 4px 16px 110px;
    overflow-y: auto;
  }

  .screen { display: none; }
  .screen.active { display: block; }

  /* ---------- Ranking screen ---------- */
  .rank-podium {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    padding: 18px 4px 26px;
  }

  .podium-card {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 14px 10px 12px;
    text-align: center;
    position: relative;
  }

  .podium-card.first {
    background: linear-gradient(180deg, rgba(111,169,111,0.18), var(--surface) 60%);
    border-color: var(--green-dim);
    transform: translateY(-10px);
    padding-top: 20px;
  }

  .podium-rank {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-faint);
    letter-spacing: 0.08em;
  }

  .podium-card.first .podium-rank { color: var(--green); }

  .podium-avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    margin: 8px auto 8px;
    background: var(--bg-elevated);
    border: 2px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 12px;
    letter-spacing: -0.5px;
    color: var(--text-dim);
      overflow: hidden;
  }

  .podium-card.first .podium-avatar {
    border-color: var(--green);
    color: var(--green);
    width: 52px; height: 52px;
    font-size: 14px;
  }

  .podium-name {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .podium-winrate {
    font-variant-numeric: tabular-nums;
    font-size: 19px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }

  .podium-card.first .podium-winrate { color: var(--green); }
  .podium-winrate small { font-size: 11px; color: var(--text-faint); font-weight: 600; }

  .section-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-faint);
    letter-spacing: 0.06em;
    margin: 22px 4px 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-label::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .stat-table {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
  }

  .stat-row {
    display: grid;
    grid-template-columns: 22px 1fr 34px 34px 34px 54px;
    align-items: center;
    padding: 12px 14px;
    gap: 6px;
    border-bottom: 1px solid var(--line);
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-row.head {
    color: var(--text-faint);
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 8px 14px;
  }
  .stat-row .rk { font-weight: 800; font-size: 13px; color: var(--text-dim); }
  .stat-row.head .rk { color: transparent; }
  .stat-row .nm { font-weight: 700; font-size: 14px; }
  .stat-row .num { font-variant-numeric: tabular-nums; font-size: 13px; text-align: center; color: var(--text-dim); }
  .stat-row .wr { font-variant-numeric: tabular-nums; font-size: 13px; text-align: center; font-weight: 800; }
  .stat-row.top1 .rk { color: var(--green); }
  .stat-row.top1 .wr { color: var(--green); }

  /* ---------- History screen ---------- */
  /* ---------- Filter bar ---------- */
  .filter-bar {
    margin-bottom: 14px;
  }

  .filter-chips {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 2px 2px 4px;
    scrollbar-width: none;
  }
  .filter-chips::-webkit-scrollbar { display: none; }

  .chip {
    flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--line);
    color: var(--text-dim);
    font-size: 12.5px;
    font-weight: 700;
    padding: 7px 14px;
    border-radius: 999px;
    cursor: pointer;
    white-space: nowrap;
  }
  .chip.active {
    background: linear-gradient(160deg, #EF9862, var(--orange));
    border-color: transparent;
    color: #1C0D06;
  }

  .date-filter-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
  }
  .date-filter-row input[type="date"] {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    color: var(--text);
    padding: 9px 10px;
    font-size: 12.5px;
    font-family: inherit;
    min-width: 0;
  }
  .date-filter-row .to-sep {
    color: var(--text-faint);
    font-size: 11px;
    font-weight: 700;
  }
  .date-filter-row .reset-btn {
    background: none;
    border: 1px solid var(--line);
    color: var(--text-faint);
    border-radius: 10px;
    width: 34px; height: 34px;
    flex-shrink: 0;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .date-filter-row .reset-btn svg { width: 14px; height: 14px; }

  .match-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 14px;
    margin-bottom: 12px;
    position: relative;
  }

  .match-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .match-date {
    font-size: 11px;
    color: var(--text-faint);
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  .match-menu-btn {
    background: none;
    border: none;
    color: var(--text-faint);
    padding: 4px 6px;
    cursor: pointer;
    line-height: 1;
    width: 22px;
    height: 22px;
  }
  .match-menu-btn svg { width: 100%; height: 100%; }

  .match-body {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .match-players {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .player-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    width: 64px;
  }

  .player-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--bg-elevated);
    border: 1.5px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 800; letter-spacing: -0.4px; color: var(--text-dim);
      overflow: hidden;
  }
  .player-block.winner .player-avatar {
    border-color: var(--green);
    color: var(--green);
  }
  .player-block.loser-focus .player-avatar {
    border-color: var(--orange);
    color: var(--orange);
  }

  .player-name {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-dim);
    text-align: center;
    white-space: nowrap;
  }
  .player-block.winner .player-name { color: var(--text); }
  .player-block.loser-focus .player-name { color: var(--text); }

  .score-box {
    display: flex;
    align-items: center;
    gap: 6px;
    font-variant-numeric: tabular-nums;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.02em;
  }
  .score-box .dash { color: var(--text-faint); font-size: 16px; font-weight: 600; }
  .score-lose { color: var(--loss); }
  .score-win { color: var(--green); }
  .score-lose-focus { color: var(--orange); }

  .thumb {
    width: 46px; height: 46px;
    border-radius: 10px;
    background: var(--bg-elevated);
    border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-faint);
    font-size: 18px;
    flex-shrink: 0;
    overflow: hidden;
  }
  .thumb svg { width: 20px; height: 20px; }

  .thumb { cursor: pointer; }

  /* ---------- Lightbox ---------- */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(6,8,18,0.92);
    z-index: 40;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
  }
  .lightbox.show { opacity: 1; pointer-events: auto; }

  .lightbox-img {
    width: auto;
    max-width: 100%;
    max-height: 100%;
    background: var(--bg-elevated);
    border: 1px solid var(--line);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--text-faint);
    font-size: 13px;
    font-weight: 600;
    text-align: center;
  }
  .lightbox-img.has-image {
    width: 100%;
    padding: 0;
    border: none;
    background: transparent;
  }
  .lightbox-img.empty {
    width: 100%;
    max-width: 420px;
    aspect-ratio: 9 / 16;
    padding: 20px;
  }
  .lightbox-img img {
    display: block;
    max-width: 100%;
    max-height: 96vh;
    width: 100%;
    height: auto;
    object-fit: contain;
    border-radius: 12px;
  }
  .lightbox-img .big-icon { width: 44px; height: 44px; color: var(--text-faint); }

  .lightbox-close {
    position: absolute;
    top: max(20px, env(safe-area-inset-top));
    right: 20px;
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--line);
    color: var(--text);
    font-size: 17px;
    display: flex; align-items: center; justify-content: center;
    z-index: 41;
  }
  .lightbox-close svg { width: 16px; height: 16px; }

  /* ---------- Head-to-head heatmap ---------- */
  .h2h-intro {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
    margin: 2px 4px 18px;
  }

  .h2h-grid {
    display: grid;
    grid-template-columns: 54px repeat(3, 1fr);
    gap: 6px;
  }

  .h2h-cell {
    aspect-ratio: 1;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-variant-numeric: tabular-nums;
  }

  .h2h-head {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .h2h-head .h2h-avatar {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 800; letter-spacing: -0.3px; color: var(--text-dim);
      overflow: hidden;
  }
  .h2h-head .h2h-label { font-size: 10px; font-weight: 700; color: var(--text-faint); }

  .h2h-row-head {
    display: flex;
    align-items: center;
    gap: 6px;
    padding-left: 2px;
  }
  .h2h-row-head .h2h-avatar {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 800; letter-spacing: -0.3px; color: var(--text-dim);
    flex-shrink: 0;
      overflow: hidden;
  }
  .h2h-row-head .h2h-label { font-size: 11px; font-weight: 700; color: var(--text-dim); }

  .h2h-cell.self {
    background: var(--bg);
    border: 1px dashed var(--line);
  }
  .h2h-cell.empty {
    background: var(--surface);
    border: 1px solid var(--line);
    color: var(--text-faint);
    font-size: 11px;
    font-weight: 700;
  }
  .h2h-cell .rate {
    font-size: 15px;
    font-weight: 800;
  }
  .h2h-cell .record {
    font-size: 9px;
    font-weight: 600;
    opacity: 0.85;
    margin-top: 1px;
  }

  .h2h-legend {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 22px;
    padding: 0 4px;
  }
  .h2h-legend .bar {
    flex: 1;
    height: 8px;
    border-radius: 4px;
    background: linear-gradient(90deg, #14130E, #6FA96F);
  }
  .h2h-legend span {
    font-size: 10px;
    color: var(--text-faint);
    font-weight: 600;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-faint);
  }
  .empty-state .icon { width: 34px; height: 34px; margin: 0 auto 12px; opacity: 0.55; color: var(--text-dim); }
  .empty-state p { font-size: 13px; line-height: 1.6; }

  /* ---------- Bottom tab bar ---------- */
  .tabbar {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: 0;
    width: 100%;
    max-width: 480px;
    background: rgba(19,18,13,0.92);
    backdrop-filter: blur(14px);
    border-top: 1px solid var(--line);
    display: flex;
    padding: 8px 12px calc(10px + env(safe-area-inset-bottom));
    z-index: 20;
  }

  .tab-btn {
    flex: 1;
    background: none;
    border: none;
    color: var(--text-faint);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    font-size: 10.5px;
    font-weight: 700;
    padding: 6px 0;
    cursor: pointer;
    letter-spacing: 0.02em;
  }
  .tab-btn .tab-icon { width: 20px; height: 20px; display: block; }
  .tab-btn.active { color: var(--orange); }

  /* ---------- FAB ---------- */
  .fab-wrap {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: 76px;
    width: 100%;
    max-width: 480px;
    height: 0;
    pointer-events: none;
    z-index: 21;
  }
  .fab {
    position: absolute;
    right: 18px;
    bottom: 0;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: linear-gradient(160deg, #EF9862, var(--orange));
    border: none;
    color: #1C0D06;
    font-weight: 700;
    box-shadow: 0 8px 22px rgba(228,121,60,0.35), 0 2px 6px rgba(0,0,0,0.3);
    display: flex; align-items: center; justify-content: center;
    pointer-events: auto;
    cursor: pointer;
  }
  .fab svg { width: 24px; height: 24px; }

  /* ---------- Sheet (new match form) ---------- */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(6,8,18,0.6);
    z-index: 30;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    display: flex;
    justify-content: center;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }

  .sheet {
    width: 100%;
    max-width: 480px;
    background: var(--bg-elevated);
    border-radius: 22px 22px 0 0;
    align-self: flex-end;
    padding: 10px 20px calc(24px + env(safe-area-inset-bottom));
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(.32,.72,0,1);
    max-height: 88vh;
    overflow-y: auto;
    border-top: 1px solid var(--line);
  }
  .overlay.show .sheet { transform: translateY(0); }

  .sheet-handle {
    width: 36px; height: 4px;
    background: var(--line);
    border-radius: 3px;
    margin: 8px auto 16px;
  }

  .sheet h2 {
    font-size: 17px;
    font-weight: 800;
    margin-bottom: 18px;
  }

  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-dim);
    margin-bottom: 7px;
  }

  .field input[type="date"],
  .field select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    color: var(--text);
    padding: 11px 12px;
    font-size: 14px;
    font-family: inherit;
    appearance: none;
  }

  .field select {
    text-align: center;
    text-align-last: center;
    font-weight: 700;
  }

  .field input[type="date"] {
    color: var(--text);
    font-weight: 700;
    -webkit-text-fill-color: var(--text);
  }
  .field input[type="date"]::-webkit-datetime-edit,
  .field input[type="date"]::-webkit-datetime-edit-fields-wrapper,
  .field input[type="date"]::-webkit-datetime-edit-text,
  .field input[type="date"]::-webkit-datetime-edit-month-field,
  .field input[type="date"]::-webkit-datetime-edit-day-field,
  .field input[type="date"]::-webkit-datetime-edit-year-field {
    color: var(--text);
    -webkit-text-fill-color: var(--text);
  }

  .vs-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .vs-row .field { flex: 1; margin-bottom: 0; }
  .vs-sep { color: var(--text-faint); font-weight: 700; font-size: 13px; margin-top: 18px; }

  .score-input-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .score-input-row .field { flex: 1; margin-bottom: 0; }
  .score-input-row input[type="number"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    color: var(--text);
    padding: 11px 12px;
    font-size: 20px;
    font-weight: 800;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .score-input-row .vs-sep { margin-top: 20px; }

  .upload-box {
    border: 1.5px dashed var(--line);
    border-radius: 12px;
    padding: 18px;
    text-align: center;
    color: var(--text-faint);
    font-size: 12.5px;
    cursor: pointer;
  }
  .upload-box .icon { width: 22px; height: 22px; margin: 0 auto 8px; display: block; }
  .upload-box.filled {
    border-style: solid;
    border-color: var(--green-dim);
    color: var(--green);
  }

  .save-btn {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    background: linear-gradient(160deg, #EF9862, var(--orange));
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 800;
    color: #1C0D06;
    margin-top: 6px;
    cursor: pointer;
  }

  .cancel-link {
    display: block;
    text-align: center;
    color: var(--text-faint);
    font-size: 13px;
    font-weight: 600;
    margin-top: 14px;
    background: none; border: none; width: 100%; padding: 6px;
    cursor: pointer;
  }

  /* ---------- Action menu ---------- */
  .action-menu {
    position: absolute;
    top: 36px;
    right: 10px;
    background: var(--bg-elevated);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    z-index: 15;
    box-shadow: 0 10px 24px rgba(0,0,0,0.4);
    display: none;
    min-width: 120px;
  }
  .action-menu.show { display: block; }
  .action-menu button {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    background: none;
    border: none;
    color: var(--text);
    text-align: left;
    padding: 11px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .action-menu button svg { width: 15px; height: 15px; flex-shrink: 0; }
  .action-menu button:active { background: var(--surface); }
  .action-menu button.del { color: var(--danger); }
  .action-menu .divider { height: 1px; background: var(--line); }
</style>
</head>
<body>

<div class="app">

  <header>
    <div class="brand">
      <div class="eyebrow">MATCH HISTORY</div>
      <h1>対戦<span>成績</span></h1>
    </div>
  </header>

  <main>
    <!-- ===== 履歴タブ ===== -->
    <section class="screen active" id="screen-history">
      <div class="section-label">対戦履歴</div>

      <div class="filter-bar">
        <div class="filter-chips" id="playerChips">
          <button class="chip active" data-player="all">全員</button>
          <button class="chip" data-player="りょーすけ">りょーすけ</button>
          <button class="chip" data-player="ゆーり">ゆーり</button>
          <button class="chip" data-player="りゅーいち">りゅーいち</button>
        </div>
        <div class="date-filter-row">
          <input type="date" id="filterFrom">
          <span class="to-sep">〜</span>
          <input type="date" id="filterTo">
          <button class="reset-btn" id="filterReset" title="絞り込み解除">×</button>
        </div>
      </div>

      <div id="matchList"></div>
    </section>

    <!-- ===== ランキングタブ ===== -->
    <section class="screen" id="screen-ranking">
      <div id="podium"></div>
      <div class="section-label">詳細成績</div>
      <div class="stat-table" id="statTable"></div>
    </section>

    <!-- ===== 対戦相性タブ ===== -->
    <section class="screen" id="screen-h2h">
      <div class="section-label">対戦相手ごとの勝率</div>
      <div class="h2h-legend">
        <span>0%</span>
        <div class="bar"></div>
        <span>100%</span>
      </div>
    </section>
  </main>

  <div class="fab-wrap">
    <button class="fab" id="fabBtn"></button>
  </div>

  <nav class="tabbar">
    <button class="tab-btn active" data-tab="history">
      <span class="tab-icon"></span>履歴
    </button>
    <button class="tab-btn" data-tab="ranking">
      <span class="tab-icon"></span>ランキング
    </button>
    <button class="tab-btn" data-tab="h2h">
      <span class="tab-icon"></span>相性
    </button>
  </nav>
</div>

<!-- 新規登録シート -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>対戦を記録</h2>

    <div class="field">
      <label>対戦日付</label>
      <input type="date" id="inputDate">
    </div>

    <div class="vs-row">
      <div class="field">
        <label>プレイヤーA</label>
        <select id="playerA">
          <option>りょーすけ</option>
          <option>ゆーり</option>
          <option>りゅーいち</option>
        </select>
      </div>
      <div class="vs-sep">VS</div>
      <div class="field">
        <label>プレイヤーB</label>
        <select id="playerB">
          <option>ゆーり</option>
          <option>りょーすけ</option>
          <option>りゅーいち</option>
        </select>
      </div>
    </div>

    <div class="score-input-row">
      <div class="field">
        <label>Aのスコア</label>
        <input type="number" id="scoreA" value="0" inputmode="numeric">
      </div>
      <div class="vs-sep">–</div>
      <div class="field">
        <label>Bのスコア</label>
        <input type="number" id="scoreB" value="0" inputmode="numeric">
      </div>
    </div>

    <div class="field">
      <label>試合結果のスクショ(任意)</label>
      <div class="upload-box" id="uploadBox">
        <span class="icon" id="uploadIcon"></span>
        タップして画像を選択
      </div>
      <input type="file" id="fileInput" accept="image/*" style="display:none">
    </div>

    <button class="save-btn" id="saveBtn">この内容で登録する</button>
    <button class="cancel-link" id="cancelBtn">キャンセル</button>
  </div>
</div>

<!-- スクショ拡大表示 -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose"></button>
  <div class="lightbox-img" id="lightboxImg"></div>
</div>

<script>
  // ---- Supabase接続設定 ----
  const SUPABASE_URL = 'https://pvfvysxlvhknxsxgwind.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_y_rk7630u2k058s0f7dv5Q_SoiirfJe';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let matches = [];
  let selectedFile = null;

  // DBの行(snake_case)をアプリ内部の形式(a/b/scoreA/scoreB/screenshotUrl)に変換
  function rowToMatch(row) {
    return {
      id: row.id,
      date: row.date,
      a: row.player_a,
      b: row.player_b,
      scoreA: row.score_a,
      scoreB: row.score_b,
      screenshotUrl: row.screenshot_url || null,
    };
  }

  async function loadMatches() {
    const list = document.getElementById('matchList');
    list.innerHTML = `<div class="empty-state"><p>読み込み中...</p></div>`;
    const { data, error } = await sb.from('matches').select('*').order('date', { ascending: false });
    if (error) {
      list.innerHTML = `<div class="empty-state"><p>データの取得に失敗しました。<br>${error.message}</p></div>`;
      return;
    }
    matches = data.map(rowToMatch);
    renderHistory();
    renderRanking();
    renderH2H();
  }

  // ---- ラインアイコン定義(テーマカラーに合わせたシンプルなSVG) ----
  const ICON = {
    list: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="4" y1="6.5" x2="20" y2="6.5"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17.5" x2="13.5" y2="17.5"/></svg>',
    trophy: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M8 4h8v5a4 4 0 0 1-8 0V4z"/><path d="M8 5.5H5.5A2.5 2.5 0 0 0 8 8"/><path d="M16 5.5h2.5A2.5 2.5 0 0 1 16 8"/><line x1="12" y1="13" x2="12" y2="16.5"/><path d="M9 20h6"/><path d="M9.8 16.5h4.4l0.8 3.5H9l0.8-3.5z"/></svg>',
    flame: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3c-1.8 3.4-5.2 5.4-5.2 9.4a5.2 5.2 0 0 0 10.4 0c0-1.7-.7-2.7-1.6-3.5.1 1.7-.8 2.6-1.6 2.6.8-2.6-.8-4.3-2-8.5z"/></svg>',
    image: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3.2" y="4.5" width="17.6" height="15" rx="2.2"/><circle cx="8.6" cy="9.6" r="1.4"/><path d="M20.5 15.5l-4.8-4.6-3.6 3.6-2.6-2.4-6 5.4"/></svg>',
    noImage: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3.2" y="4.5" width="17.6" height="15" rx="2.2"/><line x1="4" y1="20" x2="20" y2="4"/></svg>',
    camera: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7.5h3.2L9 5.2h6l1.8 2.3H20V19H4z"/><circle cx="12" cy="13" r="3.3"/></svg>',
    check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l4.5 4.5L19 7"/></svg>',
    kebab: '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5.5" r="1.7"/><circle cx="12" cy="12" r="1.7"/><circle cx="12" cy="18.5" r="1.7"/></svg>',
    edit: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 19.5l0.7-3.4L15.8 5.5l2.7 2.7L7.9 18.8l-3.4 0.7z"/><line x1="14" y1="7.3" x2="16.7" y2="10"/></svg>',
    trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="7" x2="19" y2="7"/><path d="M9 7V4.3h6V7"/><path d="M6.3 7l0.9 12.5h9.6L17.7 7"/><line x1="10" y1="10.5" x2="10" y2="16.5"/><line x1="14" y1="10.5" x2="14" y2="16.5"/></svg>',
    close: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><line x1="5.5" y1="5.5" x2="18.5" y2="18.5"/><line x1="18.5" y1="5.5" x2="5.5" y2="18.5"/></svg>',
    plus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
    search: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="10.5" cy="10.5" r="6"/><line x1="15.2" y1="15.2" x2="20.5" y2="20.5"/></svg>',
  };

  document.getElementById('fabBtn').innerHTML = ICON.plus;
  document.querySelector('[data-tab="history"] .tab-icon').innerHTML = ICON.list;
  document.querySelector('[data-tab="ranking"] .tab-icon').innerHTML = ICON.trophy;
  document.querySelector('[data-tab="h2h"] .tab-icon').innerHTML = ICON.flame;
  document.getElementById('lightboxClose').innerHTML = ICON.close;
  document.getElementById('filterReset').innerHTML = ICON.close;
  document.getElementById('uploadIcon').innerHTML = ICON.camera;

  const initials = n => n.slice(0,2);

  // ---- プレイヤーごとの写真URL(Supabase Storageにアップロード後、ここにURLを設定) ----
  const PLAYER_AVATARS = {
    'りょーすけ': 'https://pvfvysxlvhknxsxgwind.supabase.co/storage/v1/object/public/avatars/ryosuke.jpg',
    'ゆーり': 'https://pvfvysxlvhknxsxgwind.supabase.co/storage/v1/object/public/avatars/yuri.jpg',
    'りゅーいち': 'https://pvfvysxlvhknxsxgwind.supabase.co/storage/v1/object/public/avatars/ryuichi.jpg',
  };

  function avatarHTML(name) {
    const url = PLAYER_AVATARS[name];
    if (url) {
      return `<img src="${url}" alt="${name}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
    }
    return initials(name);
  }

  function formatDate(d) {
    const dt = new Date(d + "T00:00:00");
    return `${dt.getMonth()+1}/${dt.getDate()}`;
  }

  let activePlayer = 'all';

  function getFilteredMatches() {
    const from = document.getElementById('filterFrom').value;
    const to = document.getElementById('filterTo').value;
    return matches.filter(m => {
      if (activePlayer !== 'all' && m.a !== activePlayer && m.b !== activePlayer) return false;
      if (from && m.date < from) return false;
      if (to && m.date > to) return false;
      return true;
    });
  }

  function renderHistory() {
    const list = document.getElementById('matchList');
    const filtered = getFilteredMatches();

    if (matches.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="icon">${ICON.list}</div><p>まだ対戦記録がありません。<br>右下の＋ボタンから最初の一戦を記録しましょう。</p></div>`;
      return;
    }
    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="icon">${ICON.search}</div><p>条件に一致する対戦履歴がありません。<br>絞り込み条件を変更してください。</p></div>`;
      return;
    }
    const sorted = [...filtered].sort((x,y) => new Date(y.date) - new Date(x.date));
    list.innerHTML = sorted.map((m, i) => {
      const aWin = m.scoreA > m.scoreB;
      const bWin = m.scoreB > m.scoreA;
      const isFocus = activePlayer !== 'all';

      let aBlockClass = '', bBlockClass = '', aScoreClass = '', bScoreClass = '';
      if (isFocus) {
        // 絞り込み中の本人視点: 勝ち=緑、負け=オレンジ。相手側はニュートラル表示。
        const focusIsA = m.a === activePlayer;
        const focusWin = focusIsA ? aWin : bWin;
        const focusLose = focusIsA ? bWin : aWin;
        if (focusWin) {
          if (focusIsA) { aBlockClass = 'winner'; aScoreClass = 'score-win'; }
          else { bBlockClass = 'winner'; bScoreClass = 'score-win'; }
        } else if (focusLose) {
          if (focusIsA) { aBlockClass = 'loser-focus'; aScoreClass = 'score-lose-focus'; }
          else { bBlockClass = 'loser-focus'; bScoreClass = 'score-lose-focus'; }
        }
      } else {
        // 全員表示: 客観的な勝者を緑でハイライト
        aBlockClass = aWin ? 'winner' : '';
        bBlockClass = bWin ? 'winner' : '';
        aScoreClass = aWin ? 'score-win' : bWin ? 'score-lose' : '';
        bScoreClass = bWin ? 'score-win' : aWin ? 'score-lose' : '';
      }

      return `
      <div class="match-card">
        <div class="match-meta">
          <span class="match-date">${formatDate(m.date)}</span>
          <button class="match-menu-btn" onclick="toggleMenu(event, ${i})">${ICON.kebab}</button>
          <div class="action-menu" id="menu-${i}">
            <button onclick="alert('編集フォームを開きます(モックアップ)')">${ICON.edit} 編集</button>
            <div class="divider"></div>
            <button class="del" onclick="deleteMatch(${m.id})">${ICON.trash} 削除</button>
          </div>
        </div>
        <div class="match-body">
          <div class="match-players">
            <div class="player-block ${aBlockClass}">
              <div class="player-avatar">${avatarHTML(m.a)}</div>
              <div class="player-name">${m.a}</div>
            </div>
            <div class="score-box">
              <span class="${aScoreClass}">${m.scoreA}</span>
              <span class="dash">–</span>
              <span class="${bScoreClass}">${m.scoreB}</span>
            </div>
            <div class="player-block ${bBlockClass}">
              <div class="player-avatar">${avatarHTML(m.b)}</div>
              <div class="player-name">${m.b}</div>
            </div>
          </div>
          <div class="thumb" onclick="openLightbox('${m.screenshotUrl || ''}', '${m.a}', '${m.b}', '${formatDate(m.date)}')">${m.screenshotUrl ? `<img src="${m.screenshotUrl}" alt="スクリーンショット" style="width:100%;height:100%;object-fit:cover;">` : '—'}</div>
        </div>
      </div>`;
    }).join('');
  }

  function computeStats() {
    const names = ["りょーすけ", "ゆーり", "りゅーいち"];
    const stats = {};
    names.forEach(n => stats[n] = { name: n, played: 0, win: 0, lose: 0, draw: 0 });
    matches.forEach(m => {
      [m.a, m.b].forEach(n => { if (!stats[n]) stats[n] = { name: n, played: 0, win: 0, lose: 0, draw: 0 }; });
      stats[m.a].played++; stats[m.b].played++;
      if (m.scoreA > m.scoreB) { stats[m.a].win++; stats[m.b].lose++; }
      else if (m.scoreB > m.scoreA) { stats[m.b].win++; stats[m.a].lose++; }
      else { stats[m.a].draw++; stats[m.b].draw++; }
    });
    return Object.values(stats)
      .map(s => ({...s, winRate: s.played ? Math.round((s.win / s.played) * 100) : 0}))
      .sort((x,y) => y.winRate - x.winRate || y.win - x.win);
  }

  function renderRanking() {
    const ranked = computeStats();
    const podium = document.getElementById('podium');
    const order = [ranked[1], ranked[0], ranked[2]].filter(Boolean); // 2位・1位・3位の順で表示(表彰台風)
    podium.innerHTML = `<div class="rank-podium">` + order.map(s => {
      if (!s) return '';
      const isFirst = s === ranked[0];
      return `
      <div class="podium-card ${isFirst ? 'first' : ''}">
        <div class="podium-rank">${isFirst ? '1ST' : (s === ranked[1] ? '2ND' : '3RD')}</div>
        <div class="podium-avatar">${avatarHTML(s.name)}</div>
        <div class="podium-name">${s.name}</div>
        <div class="podium-winrate">${s.winRate}<small>%</small></div>
      </div>`;
    }).join('') + `</div>`;

    const table = document.getElementById('statTable');
    table.innerHTML = `
      <div class="stat-row head">
        <span></span><span>プレイヤー</span><span>試</span><span>勝</span><span>敗</span><span>勝率</span>
      </div>
      ` + ranked.map((s, i) => `
      <div class="stat-row ${i === 0 ? 'top1' : ''}">
        <span class="rk">${i+1}</span>
        <span class="nm">${s.name}</span>
        <span class="num">${s.played}</span>
        <span class="num">${s.win}</span>
        <span class="num">${s.lose}</span>
        <span class="wr">${s.winRate}%</span>
      </div>`).join('');
  }

  function computeHeadToHead() {
    const names = ["りょーすけ", "ゆーり", "りゅーいち"];
    const grid = {};
    names.forEach(p => {
      grid[p] = {};
      names.forEach(o => { if (p !== o) grid[p][o] = { win: 0, total: 0 }; });
    });
    matches.forEach(m => {
      if (!grid[m.a] || !grid[m.b]) return;
      grid[m.a][m.b].total++;
      grid[m.b][m.a].total++;
      if (m.scoreA > m.scoreB) grid[m.a][m.b].win++;
      else if (m.scoreB > m.scoreA) grid[m.b][m.a].win++;
    });
    return { names, grid };
  }

  function heatColor(rate) {
    // 低勝率(黒に近いサーフェス)〜高勝率(オレンジ)を線形補間
    const low = [20, 19, 14];    // 黒に近いサーフェス(低勝率)
    const high = [111, 169, 111]; // --green(高勝率)
    const t = rate / 100;
    const rgb = low.map((c, i) => Math.round(c + (high[i] - c) * t));
    return `rgb(${rgb.join(',')})`;
  }

  function renderH2H() {
    const { names, grid } = computeHeadToHead();
    const el = document.getElementById('h2hGrid');

    let html = `<div class="h2h-grid">`;
    html += `<div class="h2h-cell"></div>`;
    names.forEach(o => {
      html += `<div class="h2h-cell h2h-head"><div class="h2h-avatar">${avatarHTML(o)}</div><div class="h2h-label">${o}</div></div>`;
    });

    names.forEach(p => {
      html += `<div class="h2h-cell h2h-row-head"><div class="h2h-avatar">${avatarHTML(p)}</div><div class="h2h-label">${p}</div></div>`;
      names.forEach(o => {
        if (p === o) {
          html += `<div class="h2h-cell self"></div>`;
          return;
        }
        const rec = grid[p][o];
        if (rec.total === 0) {
          html += `<div class="h2h-cell empty">ー</div>`;
        } else {
          const rate = Math.round((rec.win / rec.total) * 100);
          const textColor = rate >= 55 ? '#0F1C0E' : '#F6F3EA';
          html += `<div class="h2h-cell" style="background:${heatColor(rate)};color:${textColor}">
              <span class="rate">${rate}%</span>
              <span class="record">${rec.win}勝${rec.total - rec.win}敗</span>
            </div>`;
        }
      });
    });
    html += `</div>`;
    el.innerHTML = html;
  }

  function toggleMenu(e, i) {
    e.stopPropagation();
    document.querySelectorAll('.action-menu').forEach(m => {
      if (m.id !== `menu-${i}`) m.classList.remove('show');
    });
    document.getElementById(`menu-${i}`).classList.toggle('show');
  }
  document.addEventListener('click', () => {
    document.querySelectorAll('.action-menu').forEach(m => m.classList.remove('show'));
  });

  async function deleteMatch(id) {
    const target = matches.find(m => m.id === id);
    if (!target) return;
    if (!confirm(`${target.a} vs ${target.b}(${formatDate(target.date)})の記録を削除しますか?`)) return;
    const { error } = await sb.from('matches').delete().eq('id', id);
    if (error) { alert('削除に失敗しました: ' + error.message); return; }
    await loadMatches();
  }

  // タブ切り替え(ランキング画面では＋ボタンを非表示にする)
  const fabBtnEl = document.getElementById('fabBtn');
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(`screen-${btn.dataset.tab}`).classList.add('active');
      fabBtnEl.style.display = btn.dataset.tab === 'history' ? 'flex' : 'none';
    });
  });

  // 絞り込み: プレイヤーチップ
  document.querySelectorAll('#playerChips .chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('#playerChips .chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activePlayer = chip.dataset.player;
      renderHistory();
    });
  });

  // 絞り込み: 日付レンジ
  document.getElementById('filterFrom').addEventListener('change', renderHistory);
  document.getElementById('filterTo').addEventListener('change', renderHistory);
  document.getElementById('filterReset').addEventListener('click', () => {
    activePlayer = 'all';
    document.querySelectorAll('#playerChips .chip').forEach(c => c.classList.remove('active'));
    document.querySelector('#playerChips .chip[data-player="all"]').classList.add('active');
    document.getElementById('filterFrom').value = '';
    document.getElementById('filterTo').value = '';
    renderHistory();
  });

  // 新規登録シート
  const overlay = document.getElementById('overlay');
  function resetUploadUI() {
    selectedFile = null;
    document.getElementById('fileInput').value = '';
    const box = document.getElementById('uploadBox');
    box.classList.remove('filled');
    box.innerHTML = `<span class="icon">${ICON.camera}</span>タップして画像を選択`;
  }
  document.getElementById('fabBtn').addEventListener('click', () => {
    document.getElementById('inputDate').valueAsDate = new Date();
    document.getElementById('scoreA').value = 0;
    document.getElementById('scoreB').value = 0;
    resetUploadUI();
    overlay.classList.add('show');
  });
  document.getElementById('cancelBtn').addEventListener('click', () => overlay.classList.remove('show'));
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('show'); });

  document.getElementById('uploadBox').addEventListener('click', function() {
    document.getElementById('fileInput').click();
  });

  document.getElementById('fileInput').addEventListener('change', function() {
    const file = this.files[0];
    const box = document.getElementById('uploadBox');
    if (!file) { resetUploadUI(); return; }
    selectedFile = file;
    box.classList.add('filled');
    box.innerHTML = `<span class="icon" style="color:var(--green)">${ICON.check}</span>${file.name}`;
  });

  document.getElementById('saveBtn').addEventListener('click', async () => {
    const a = document.getElementById('playerA').value;
    const b = document.getElementById('playerB').value;
    if (a === b) { alert('プレイヤーAとBは異なる相手を選択してください'); return; }

    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true;
    saveBtn.textContent = '登録中...';

    try {
      let screenshotUrl = null;
      if (selectedFile) {
        const ext = selectedFile.name.split('.').pop();
        const path = `${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
        const { error: uploadError } = await sb.storage.from('screenshots').upload(path, selectedFile);
        if (uploadError) throw uploadError;
        const { data: publicUrlData } = sb.storage.from('screenshots').getPublicUrl(path);
        screenshotUrl = publicUrlData.publicUrl;
      }

      const { error: insertError } = await sb.from('matches').insert({
        date: document.getElementById('inputDate').value,
        player_a: a,
        player_b: b,
        score_a: Number(document.getElementById('scoreA').value) || 0,
        score_b: Number(document.getElementById('scoreB').value) || 0,
        screenshot_url: screenshotUrl,
      });
      if (insertError) throw insertError;

      await loadMatches();
      overlay.classList.remove('show');
    } catch (err) {
      alert('登録に失敗しました: ' + err.message);
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = 'この内容で登録する';
    }
  });

  function openLightbox(url, a, b, date) {
    const box = document.getElementById('lightboxImg');
    if (url) {
      box.classList.add('has-image');
      box.classList.remove('empty');
      box.innerHTML = `<img src="${url}" alt="${a} vs ${b} スクリーンショット">`;
    } else {
      box.classList.remove('has-image');
      box.classList.add('empty');
      box.innerHTML = `<span class="big-icon">${ICON.noImage}</span><span>この試合にはスクリーンショットが登録されていません</span>`;
    }
    document.getElementById('lightbox').classList.add('show');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('show');
  }
  document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
  document.getElementById('lightbox').addEventListener('click', (e) => {
    if (e.target.id === 'lightbox') closeLightbox();
  });

  loadMatches();
</script>

</body>
</html>
